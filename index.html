<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuehan - AI Engineer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #FFF9E6 0%, #FFF3CD 50%, #FFECB3 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(255, 193, 7, 0.2);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFC107, #FF9800);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: 0 8px 30px rgba(255, 152, 0, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #FF8F00;
        }

        .header .subtitle {
            font-size: 1.3em;
            color: #F57C00;
            margin-bottom: 15px;
        }

        .header .intro {
            font-size: 1.1em;
            color: #666;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* 板块样式 */
        .section {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(255, 193, 7, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(255, 193, 7, 0.25);
        }

        .section h2 {
            color: #FF8F00;
            font-size: 1.8em;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #FFC107;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section h2::before {
            content: '';
            width: 8px;
            height: 30px;
            background: linear-gradient(180deg, #FFC107, #FF9800);
            border-radius: 4px;
        }

        /* 技能标签 */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .skill-tag {
            background: linear-gradient(135deg, #FFF8E1, #FFECB3);
            color: #F57C00;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 500;
            border: 2px solid #FFD54F;
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            background: linear-gradient(135deg, #FFC107, #FF9800);
            color: white;
            transform: scale(1.05);
        }

        /* 项目卡片 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .project-card {
            background: linear-gradient(135deg, #FFF9E6, #FFF3CD);
            border-radius: 12px;
            padding: 25px;
            border-left: 4px solid #FFC107;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 20px rgba(255, 193, 7, 0.3);
        }

        .project-card h3 {
            color: #FF8F00;
            margin-bottom: 12px;
            font-size: 1.2em;
        }

        .project-card p {
            color: #666;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .project-tag {
            display: inline-block;
            background: #FFC107;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-top: 12px;
        }

        /* 联系方式 */
        .contact-list {
            margin-top: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #FFE082;
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #FFC107, #FF9800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 20px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .contact-value {
            color: #666;
        }

        .contact-value a {
            color: #FF8F00;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-value a:hover {
            color: #F57C00;
            text-decoration: underline;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 0.9em;
        }

        .footer span {
            color: #FFC107;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .section {
                padding: 25px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }
        }

        /* GitHub热门项目卡片 */
        .github-card {
            background: linear-gradient(135deg, #FFF9E6, #FFF3CD);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #FFC107;
            transition: all 0.3s ease;
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .github-card:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 20px rgba(255, 193, 7, 0.3);
        }

        .github-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .github-card-title {
            color: #FF8F00;
            font-size: 1.1em;
            font-weight: 600;
            margin: 0;
        }

        .github-card-stars {
            background: linear-gradient(135deg, #FFC107, #FF9800);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 500;
            white-space: nowrap;
        }

        .github-card-desc {
            color: #666;
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 5px;
        }

        .github-card-desc-en {
            color: #999;
            font-size: 0.8em;
            line-height: 1.4;
            margin-bottom: 10px;
            font-style: italic;
        }

        .github-card-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
        }

        .github-card-lang {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lang-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #FFC107;
        }

        /* AI新闻卡片 */
        .news-card {
            background: linear-gradient(135deg, #FFF9E6, #FFF3CD);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 4px solid #FF9800;
            transition: all 0.3s ease;
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .news-card:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.3);
        }

        .news-card-title {
            color: #333;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-card-title-cn {
            color: #FF8F00;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .news-card-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
        }

        .news-score {
            color: #FF9800;
            font-weight: 500;
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #FF8F00;
            font-size: 1.1em;
        }

        .loading::before {
            content: '⏳';
            margin-right: 10px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 更新时间 */
        .update-time {
            text-align: right;
            font-size: 0.85em;
            color: #999;
            margin-top: 10px;
        }

        /* Tab切换样式 */
        .tabs-container {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(255, 193, 7, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tabs-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(255, 193, 7, 0.25);
        }

        .tabs-header {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 3px solid #FFC107;
            padding-bottom: 15px;
        }

        .tab-button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 12px 12px 0 0;
            background: linear-gradient(135deg, #FFF8E1, #FFECB3);
            color: #F57C00;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-button:hover {
            background: linear-gradient(135deg, #FFE082, #FFD54F);
        }

        .tab-button.active {
            background: linear-gradient(135deg, #FFC107, #FF9800);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .tab-description {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <div class="header">
            <div class="avatar">👨‍💻</div>
            <h1>Yuehan</h1>
            <div class="subtitle">AI Engineer</div>
            <p class="intro">热爱探索AI技术，致力于将人工智能应用于解决实际问题</p>
        </div>

        <!-- 动态内容区 - Tab切换 -->
        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-button active" data-tab="github">
                    🔥 GitHub 热门项目
                </button>
                <button class="tab-button" data-tab="news">
                    📰 AI 行业新闻
                </button>
            </div>

            <!-- GitHub热门项目内容 -->
            <div class="tab-content active" id="tab-github">
                <p class="tab-description">最近2周 Star 增长最快的开源项目</p>
                <div id="github-projects">
                    <div class="loading">加载中...</div>
                </div>
                <div class="update-time" id="github-update-time"></div>
            </div>

            <!-- AI行业新闻内容 -->
            <div class="tab-content" id="tab-news">
                <p class="tab-description">来自 Hacker News 的 AI 领域最新动态</p>
                <div id="ai-news">
                    <div class="loading">加载中...</div>
                </div>
                <div class="update-time" id="news-update-time"></div>
            </div>
        </div>

        <!-- 联系方式 -->
        <div class="section">
            <h2>联系方式</h2>
            <div class="contact-list">
                <div class="contact-item">
                    <div class="contact-icon">📧</div>
                    <div class="contact-info">
                        <div class="contact-label">邮箱</div>
                        <div class="contact-value"><a href="mailto:hanyuehyy@github.com">hanyuehyy@github.com</a></div>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">🐙</div>
                    <div class="contact-info">
                        <div class="contact-label">GitHub</div>
                        <div class="contact-value"><a href="https://github.com/hanyuehyy" target="_blank">github.com/hanyuehyy</a></div>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">💼</div>
                    <div class="contact-info">
                        <div class="contact-label">LinkedIn</div>
                        <div class="contact-value"><a href="#" target="_blank">linkedin.com/in/yuehan</a></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <p>© 2026 Yuehan | Built with <span>❤</span> and AI</p>
        </div>
    </div>

    <script>
        // 格式化数字（如 1200 -> 1.2k）
        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // 格式化时间
        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Tab切换功能
        function initTabs() {
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');

            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.getAttribute('data-tab');

                    // 移除所有active类
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    tabContents.forEach(content => content.classList.remove('active'));

                    // 添加active类到当前选中的tab
                    button.classList.add('active');
                    document.getElementById('tab-' + tabId).classList.add('active');
                });
            });
        }

        // 渲染GitHub项目卡片
        function renderGitHubProjects(projects) {
            const container = document.getElementById('github-projects');

            if (!projects || projects.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">暂无数据，请稍后再试</p>';
                return;
            }

            let html = '';
            projects.forEach(project => {
                // 显示中文描述（如果有），否则显示英文描述
                const desc = project.description_cn || project.description;
                const showEnglish = project.description_cn && project.description_cn !== project.description;

                html += `
                    <a href="${project.url}" target="_blank" class="github-card">
                        <div class="github-card-header">
                            <div class="github-card-title">${project.full_name}</div>
                            <div class="github-card-stars">⭐ ${formatNumber(project.stars)}</div>
                        </div>
                        <div class="github-card-desc">${desc}</div>
                        ${showEnglish ? `<div class="github-card-desc-en">${project.description}</div>` : ''}
                        <div class="github-card-meta">
                            <div class="github-card-lang">
                                <span class="lang-dot"></span>
                                ${project.language}
                            </div>
                            <div>🍴 ${formatNumber(project.forks)} forks</div>
                        </div>
                    </a>
                `;
            });

            container.innerHTML = html;
        }

        // 渲染AI新闻卡片
        function renderAINews(news) {
            const container = document.getElementById('ai-news');

            if (!news || news.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">暂无数据，请稍后再试</p>';
                return;
            }

            let html = '';
            news.forEach(item => {
                // 优先显示中文标题，如果没有则显示原标题
                const title = item.title_cn || item.title;
                html += `
                    <a href="${item.url}" target="_blank" class="news-card">
                        <div class="news-card-title">${title}</div>
                        ${item.title_cn && item.title_cn !== item.title ? `<div class="news-card-title-cn">${item.title}</div>` : ''}
                        <div class="news-card-meta">
                            <span class="news-score">👍 ${item.score} 分</span>
                            <span>💬 ${item.comments} 评论</span>
                        </div>
                    </a>
                `;
            });

            container.innerHTML = html;
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/data.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('Failed to load data');
                }

                const data = await response.json();

                // 渲染GitHub项目
                renderGitHubProjects(data.github_projects);
                document.getElementById('github-update-time').textContent =
                    '更新时间：' + formatTime(data.updated_at);

                // 渲染AI新闻
                renderAINews(data.ai_news);
                document.getElementById('news-update-time').textContent =
                    '更新时间：' + formatTime(data.updated_at);

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('github-projects').innerHTML =
                    '<p style="color: #999; text-align: center;">数据加载失败，请稍后再试</p>';
                document.getElementById('ai-news').innerHTML =
                    '<p style="color: #999; text-align: center;">数据加载失败，请稍后再试</p>';
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            loadData();
        });
    </script>
</body>
</html>
